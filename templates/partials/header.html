function showInfo() {
    const modalBody = document.getElementById('modalBody');
    modalBody.innerHTML = `
        <h2>Chemistry Lab Web Application</h2>
        <div class="info-content">
            <p>This project is a comprehensive digital chemistry laboratory system designed to simplify and modernize traditional lab work. It provides an interactive platform where students can perform virtual experiments, record observations, carry out calculations, and generate professional lab reports automatically.</p>
            
            <p><strong>Objective</strong></p>
            <p>The main goal of this project is to eliminate manual calculation errors, reduce paperwork, and provide a smart, user-friendly environment for conducting chemistry experiments digitally.</p>
            
            <p><strong>Key Features</strong></p>
            <p><strong>1. Multiple Experiment Support</strong><br>
            The system includes 8 major chemistry experiments:</p>
            <ul>
                <li>DETERMINATION OF HARDNESS (Ca²⁺) OF WATER USING EDTA COMPLEXOMETRY METHOD</li>
                <li>ESTIMATION OF AMOUNT OF CHLORIDE CONTENT OF A WATER SAMPLE</li>
                <li>DETERMINATION OF THE AMOUNT OF SODIUM CARBONATE AND SODIUM HYDROXIDE IN A MIXTURE BY TITRATION</li>
                <li>DETERMINATION OF STRENGTH OF AN ACID USING pH METER</li>
                <li>DETERMINATION OF STRENGTH OF AN ACID BY CONDUCTOMETRY</li>
                <li>DETERMINATION OF THE STRENGTH OF A MIXTURE OF ACETIC ACID AND HYDROCHLORIC ACID BY CONDUCTOMETRY</li>
                <li>DETERMINATION OF FERROUS ION USING POTASSIUM DICHROMATE BY POTENTIOMETRIC TITRATION</li>
                <li>DETERMINATION OF MOLECULAR WEIGHT OF A POLYMER BY VISCOSITY AVERAGE METHOD</li>
            </ul>
            
            <p><strong>2. Dynamic Table Generation</strong><br>
            Users can select the number of readings. Tables are generated dynamically. All input fields are initialized to 0 by default. Calculated fields are auto-computed.</p>
            
            <p><strong>3. Automatic Calculations</strong><br>
            The system performs step-by-step calculations, concordant value detection, average calculations, and formula-based result generation.</p>
            
            <p><strong>4. Edit Values Feature</strong><br>
            Users can modify entered values even after calculation. No need to restart the experiment.</p>
            
            <p><strong>5. Graph Generation</strong><br>
            For relevant experiments, graphs are automatically plotted to identify equivalence/end points visually.</p>
            
            <p><strong>6. Professional PDF Report Generation</strong><br>
            Users can download a complete lab report including experiment title, date, name, registration number, observation tables, graphs, calculations, and final results.</p>
            
            <p><strong>7. Consistent UI & Table Design</strong><br>
            Uniform table format across all experiments with proper borders, alignment, and formatting.</p>
            
            <p><strong>8. Error Handling & Data Safety</strong><br>
            Handles empty or incorrect inputs safely and ensures smooth user experience.</p>
            
            <p><strong>Technologies Used</strong></p>
            <p>Frontend: HTML, CSS, JavaScript<br>Backend: Python (Flask)<br>PDF Generation: ReportLab<br>Graph Plotting: Matplotlib</p>
            
            <p><strong>Developers</strong></p>
            <p><strong>Bibek Khadka</strong> - Backend (PDF Generation & Graph)<br>
            <strong>Dipendra Sah</strong> - Frontend</p>
            
            <p><strong>Contact for More Information</strong></p>
            <p>WhatsApp: +977 9867154760</p>

            <p>This project transforms traditional lab work into a smart digital system, making experiments faster, more accurate, easy to manage, and professionally documented.</p>
            
            <p><strong>Future Enhancements</strong></p>
            <p>Database integration, user login system, cloud storage for reports, and AI-based error detection.</p>
            
            <p><strong>Conclusion</strong></p>
            <p>This Chemistry Lab Web Application is a complete automation system that bridges the gap between traditional laboratory practices and modern technology.</p>

function closeModal(event) {
    if (event.target === document.getElementById('modalOverlay')) {

}
